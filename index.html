<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Circular Economy Wallet</title>

<style>

:root{
--bg:#0C1610;
--bg-card:#15231B;
--gold:#E1BE73;
--gold-dark:#CBA135;
--olive:#7D8F52;
--text:#F7F3E8;
--text-muted:#D8D3C2;
}

body{
font-family:Arial,sans-serif;
background:var(--bg);
margin:0;
padding:0;
text-align:center;
color:var(--text);
}

.hero{
padding:80px 20px;
max-width:900px;
margin:auto;
}

h1{
font-size:3.5rem;
margin-bottom:20px;
line-height:1.1;
}

.olive{
color:var(--olive);
}

.gold{
color:var(--gold);
}

h2{
color:var(--gold);
}

h3{
color:var(--gold);
}

.tagline{
font-size:1.3rem;
margin-bottom:30px;
color:var(--text-muted);
max-width:700px;
margin-left:auto;
margin-right:auto;
}

.button{
background:var(--gold);
color:var(--bg);
padding:15px 30px;
border-radius:10px;
text-decoration:none;
font-size:1.1rem;
cursor:pointer;
display:inline-block;
border:none;
font-weight:bold;
box-shadow:
0 0 20px rgba(225,190,115,0.25),
0 0 40px rgba(225,190,115,0.10);
transition:all 0.3s ease;
}

.button:hover{
background:var(--gold-dark);
transform:translateY(-2px);
}

.section{
padding:50px 20px;
max-width:900px;
margin:auto;
color:var(--text-muted);
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--bg-card);
padding:20px;
border-radius:14px;
border:1px solid rgba(225,190,115,0.2);
box-shadow:0 8px 30px rgba(0,0,0,0.25);
}

.card p{
color:var(--text-muted);
}

footer{
padding:30px;
font-size:0.9rem;
