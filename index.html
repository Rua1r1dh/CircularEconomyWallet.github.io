<script>

function openModal(){
document.getElementById("waitlistPopup").style.display="block";
}

function closeModal(){
document.getElementById("waitlistPopup").style.display="none";
}

window.onclick = function(event){

const modal =
document.getElementById("waitlistPopup");

if(event.target == modal){
modal.style.display = "none";
}

}

document.addEventListener("DOMContentLoaded", function(){

document
.getElementById("waitlistForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const form = e.target;

const data = new FormData(form);

try {

const response = await fetch(
"https://formspree.io/f/xzdlorvr",
{
method:"POST",
body:data,
headers:{
"Accept":"application/json"
}
}
);

if(response.ok){

form.style.display = "none";

document.getElementById("successMessage").style.display = "block";

}

}
catch(err){

alert("Something went wrong. Please try again.");

}

});

});

</script>
