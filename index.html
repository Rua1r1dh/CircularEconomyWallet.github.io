<script>

function openModal(){
document.getElementById("waitlistPopup").style.display = "block";
}

function closeModal(){
document.getElementById("waitlistPopup").style.display = "none";
}

window.onclick = function(event){

const modal = document.getElementById("waitlistPopup");

if(event.target == modal){
modal.style.display = "none";
}

}

document.getElementById("waitlistForm").addEventListener("submit", async function(e){

e.preventDefault();

const form = e.target;

const data = new FormData(form);

const response = await fetch(
"https://formspree.io/f/xzdlorvr",
{
method:"POST",
body:data,
headers:{
'Accept':'application/json'
}
}
);

if(response.ok){

document.querySelector(".modal-content").innerHTML = `

<h2>🎉 Thank You!</h2>

<p style="margin-top:20px;">
You've successfully joined the Circular Economy Wallet waiting list.
</p>

<p>
We'll keep you updated as we build the platform.
</p>

<button
class="submit-btn"
onclick="closeModal()"
style="margin-top:20px;">

Close

</button>

`;

}else{

alert("Something went wrong. Please try again.");

}

});

</script>
