<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Circular Economy Wallet</title>

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:Arial,sans-serif;
}

body{
background:#f5f7f5;
color:#1e293b;
line-height:1.6;
}

.hero{
padding:100px 20px;
text-align:center;
background:linear-gradient(135deg,#0f766e,#14b8a6);
color:white;
}

.hero h1{
font-size:3rem;
margin-bottom:20px;
}

.hero p{
font-size:1.3rem;
max-width:800px;
margin:auto;
margin-bottom:30px;
}

.button{
display:inline-block;
background:white;
color:#0f766e;
padding:15px 30px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
}

.section{
max-width:1000px;
margin:auto;
padding:80px 20px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:white;
padding:30px;
border-radius:12px;
box-shadow:0 3px 12px rgba(0,0,0,0.1);
}

.card h3{
margin-bottom:10px;
color:#0f766e;
}

footer{
padding:40px;
background:#e5e7eb;
text-align:center;
}

/* Modal */

.modal{
display:none;
position:fixed;
z-index:999;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
}

.modal-content{
background:white;
max-width:500px;
margin:10% auto;
padding:30px;
border-radius:12px;
position:relative;
text-align:center;
}

.close{
position:absolute;
right:15px;
top:10px;
font-size:30px;
cursor:pointer;
}

.modal input,
.modal textarea{
