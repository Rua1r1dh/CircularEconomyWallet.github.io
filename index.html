<style>

:root{
--bg:#0C1610;
--bg-card:#15231B;
--gold:#E1BE73;
--gold-dark:#CBA135;
--text:#F7F3E8;
--text-muted:#D8D3C2;
--green:#5F8F45;
}

body{
font-family:Arial,sans-serif;
background:var(--bg);
margin:0;
padding:0;
text-align:center;
color:var(--text);
}

.hero{
padding:80px 20px;
max-width:900px;
margin:auto;
}

h1{
font-size:3rem;
color:var(--gold);
}

h2{
color:var(--gold);
}

h3{
color:var(--gold);
}

.tagline{
font-size:1.3rem;
margin-bottom:30px;
color:var(--text-muted);
}

.button{
background:var(--gold);
color:var(--bg);
padding:15px 30px;
border-radius:10px;
text-decoration:none;
font-size:1.1rem;
cursor:pointer;
display:inline-block;
border:none;
font-weight:bold;
box-shadow:
0 0 20px rgba(225,190,115,0.25),
0 0 40px rgba(225,190,115,0.10);
transition:all 0.3s ease;
}

.button:hover{
background:var(--gold-dark);
transform:translateY(-2px);
}

.section{
padding:50px 20px;
max-width:900px;
margin:auto;
color:var(--text-muted);
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:var(--bg-card);
padding:20px;
border-radius:14px;
border:1px solid rgba(225,190,115,0.2);
box-shadow:0 8px 30px rgba(0,0,0,0.25);
}

.card p{
color:var(--text-muted);
}

footer{
padding:30px;
font-size:0.9rem;
color:var(--text-muted);
border-top:1px solid rgba(225,190,115,0.15);
}

/* POPUP */

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
z-index:9999;
}

.modal-content{
background:var(--bg-card);
max-width:500px;
margin:100px auto;
padding:30px;
border-radius:16px;
position:relative;
text-align:center;
border:1px solid rgba(225,190,115,0.3);
box-shadow:
0 0 30px rgba(225,190,115,0.15);
}

.close{
position:absolute;
top:10px;
right:15px;
font-size:30px;
cursor:pointer;
color:var(--gold);
}

.modal h2{
color:var(--gold);
}

.modal p{
color:var(--text-muted);
}

.modal input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid rgba(225,190,115,0.25);
border-radius:8px;
box-sizing:border-box;
background:var(--bg);
color:var(--text);
}

.modal input::placeholder{
color:#9ca3af;
}

.submit-btn{
background:var(--gold);
color:var(--bg);
border:none;
padding:12px;
width:100%;
border-radius:8px;
cursor:pointer;
font-size:16px;
font-weight:bold;
transition:all 0.3s ease;
}

.submit-btn:hover{
background:var(--gold-dark);
}

</style>
